<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعة الرجال | LEIL Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <script defer src="theme.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f4f1ee; color: #333; }

        /* Header Style */
        .men-header { 
            background: #1a1a1a; 
            color: #d4af37; 
            padding: 80px 20px; 
            text-align: center; 
        }
        .men-header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }

        /* Grid Layout */
        .collection-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 50px auto; 
            padding: 0 20px; 
        }

        /* Product Card */
        .men-card { 
            background: #fff; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            transition: 0.3s; 
            text-align: center;
            padding-bottom: 20px;
        }
        .men-card:hover { transform: translateY(-5px); }
        .men-card img { width: 100%; height: 300px; object-fit: cover; }
        .men-card h3 { margin: 15px 0 5px; color: #1a1a1a; font-family: 'Playfair Display', serif; }
        .price { color: #d4af37; font-weight: bold; margin-bottom: 15px; display: block; }
        .shop-btn { 
            display: inline-block; 
            padding: 10px 30px; 
            background: #1a1a1a; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 4px; 
            transition: 0.3s; 
        }
        .shop-btn:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>

    <header class="men-header">
        <h1>تشكيلة الرجال</h1>
        <p>تصاميم تبرز قوتك وتفاصيلك المميزة</p>
    </header>

    <main class="collection-grid">
        <!-- منتج رجالي 1 -->
        <div class="men-card">
            <img src="D:\html project\leil\images\Gemini_Generated_Image_n61bxyn61bxyn61b.png" alt="ساعة رجالي">
            <h3>ساعة كلاسيكية</h3>
            <span class="price">450 ج.م</span>
            <a href="cheackout.html" class="shop-btn">اشتري الآن</a>
        </div>

        <!-- منتج رجالي 2 -->
        <div class="men-card">
            <img src="D:\html project\leil\images\Gemini_Generated_Image_n61bxyn61bxyn61b.png" alt="سوار رجالي">
            <h3>سوار جلد طبيعي</h3>
            <span class="price">180 ج.م</span>
            <a href="cheackout.html" class="shop-btn">اشتري الآن</a>
        </div>

        <!-- منتج رجالي 3 -->
        <div class="men-card">
            <img src="D:\html project\leil\images\Gemini_Generated_Image_n61bxyn61bxyn61b.png" alt="خاتم رجالي">
            <h3>خاتم فضي سادة</h3>
            <span class="price">220 ج.م</span>
            <a href="cheackout.html" class="shop-btn">اشتري الآن</a>
        </div>
    </main>

</body>
</html>
