<script>
    function sendToWhatsApp(event) {
        event.preventDefault(); // منع الإرسال التقليدي

        // جلب البيانات من النموذج
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;
        const payment = document.getElementById('payment').value;

        // صياغة الرسالة
        const message = `مرحباً، أريد إتمام طلب جديد:%0A` +
                        `الاسم: ${name}%0A` +
                        `رقم الهاتف: ${phone}%0A` +
                        `العنوان: ${address}%0A` +
                        `طريقة الدفع: ${payment}`;

        // رابط الواتساب (ضع رقم هاتفك هنا بدلاً من 201xxxxxxxxx)
        const whatsappUrl = `https://wa.me/201066472320?text=${message}`;

        // فتح الرابط
        window.open(whatsappUrl, '_blank');
    }
</script>

<div class="checkout-container">
    <h2>إتمام طلبك</h2>
    <form onsubmit="sendToWhatsApp(event)">
        <div class="form-group">
            <label>الاسم بالكامل</label>
            <input type="text" id="name" required placeholder="أدخل اسمك الكريم">
        </div>
        
        <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="phone" required placeholder="01xxxxxxxxx">
        </div>
        
        <div class="form-group">
            <label>العنوان بالتفصيل</label>
            <textarea id="address" rows="3" required placeholder="المحافظة - المنطقة - الشارع"></textarea>
        </div>

        <div class="form-group">
            <label>طريقة الدفع</label>
            <select id="payment">
                <option value="cash">الدفع عند الاستلام</option>
                <option value="vodafone">فودافون كاش</option>
            </select>
        </div>

        <button type="submit" class="submit-btn">إرسال الطلب عبر واتساب</button>
    </form>
</div>

        font-family: 'Playfair Display', serif; 
        color: #2d2219; 
        text-align: center; 
        margin-bottom: 30px; 
        border-bottom: 2px solid #a88a44; 
        display: inline-block; 
        width: 100%; 
        padding-bottom: 10px;
    }

    /* الحقول */
    .form-group { margin-bottom: 20px; }
    label { font-weight: 600; color: #2d2219; margin-bottom: 8px; display: block; }
    
    input, select, textarea { 
        width: 100%; 
        padding: 12px;
